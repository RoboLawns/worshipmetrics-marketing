<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Streaming knowledge base cover</title>
  <desc id="desc">Abstract broadcast waveform and switcher illustration for streaming articles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g fill="none" stroke="#93C5FD" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M180 520c80-90 160-90 240 0s160 90 240 0 160-90 240 0 160 90 240 0"/>
    <path d="M180 380c80-90 160-90 240 0s160 90 240 0 160-90 240 0 160 90 240 0" opacity="0.4"/>
  </g>
  <rect x="1160" y="170" width="240" height="170" rx="24" fill="#111827" stroke="#60A5FA" stroke-width="4"/>
  <circle cx="1240" cy="255" r="22" fill="#F59E0B"/>
  <rect x="1280" y="235" width="80" height="40" rx="10" fill="#2563EB"/>
  <text x="180" y="730" fill="#F1F5F9" font-size="82" font-family="'IBM Plex Sans', Arial, sans-serif" font-weight="700">Streaming</text>
  <text x="180" y="795" fill="#94A3B8" font-size="34" font-family="'IBM Plex Sans', Arial, sans-serif">OBS, vMix, NDI, encoders, switchers, and livestream workflows</text>
</svg>
