  <text x="180" y="780" fill="#F1F5F9" font-size="82" font-family="'IBM Plex Sans', Arial, sans-serif" font-weight="700">Display &amp; Presentation</text>
  <text x="180" y="840" fill="#94A3B8" font-size="34" font-family="'IBM Plex Sans', Arial, sans-serif">ProPresenter, LED walls, projectors, confidence monitors, and screen systems</text>
