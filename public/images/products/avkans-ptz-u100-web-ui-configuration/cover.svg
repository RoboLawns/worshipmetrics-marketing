<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d">
  <title id="t">AVKANS PTZ-U100 Web UI Configuration Guide</title>
  <desc id="d">WorshipMetrics knowledge base cover for AVKANS AVKANS PTZ-U100 NDI Camera — Setup Guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="70%" stop-color="#13181F"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- subtle grid lines -->
  <g stroke="#1E2733" stroke-width="1" opacity="0.6">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1600" height="8" fill="url(#accentBar)"/>

  <!-- brand label -->
  <text x="120" y="170" fill="#3B82F6" font-size="36" font-family="'IBM Plex Mono', Menlo, monospace" font-weight="600" letter-spacing="6">AVKANS</text>
  <line x1="120" y1="200" x2="360" y2="200" stroke="#3B82F6" stroke-width="3"/>

  <!-- article type badge -->
  <text x="120" y="260" fill="#94A3B8" font-size="28" font-family="'IBM Plex Sans', Arial, sans-serif" font-weight="600" letter-spacing="4">SETUP GUIDE</text>


  <g transform="translate(1120,340)" opacity="0.9">
    <!-- base -->
    <rect x="40" y="300" width="260" height="50" rx="8" fill="#3B82F6" opacity="0.25"/>
    <rect x="60" y="260" width="220" height="50" rx="10" fill="#3B82F6" opacity="0.45"/>
    <!-- camera body -->
    <rect x="90" y="90" width="160" height="180" rx="20" fill="#3B82F6" opacity="0.85"/>
    <!-- lens -->
    <circle cx="170" cy="180" r="68" fill="#0B0E14" stroke="#3B82F6" stroke-width="6"/>
    <circle cx="170" cy="180" r="46" fill="#13181F" stroke="#F8FAFC" stroke-width="2" opacity="0.5"/>
    <circle cx="170" cy="180" r="22" fill="#3B82F6" opacity="0.8"/>
    <!-- status leds -->
    <circle cx="120" cy="115" r="5" fill="#10B981"/>
    <circle cx="138" cy="115" r="5" fill="#EF4444"/>
  </g>

  <text x="120" y="440" fill="#F8FAFC" font-size="88" font-family="'DM Serif Display', Georgia, serif" font-weight="400">AVKANS PTZ-U100 Web UI</text>
  <text x="120" y="536" fill="#F8FAFC" font-size="88" font-family="'DM Serif Display', Georgia, serif" font-weight="400">Configuration Guide</text>


  <!-- footer -->
  <text x="120" y="800" fill="#64748B" font-size="28" font-family="'IBM Plex Sans', Arial, sans-serif">worshipmetrics.com · Knowledge Base</text>
</svg>
