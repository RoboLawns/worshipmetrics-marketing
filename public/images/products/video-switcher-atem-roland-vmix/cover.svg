<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d">
  <title id="t">Video Switcher Showdown: ATEM vs Roland vs vMix for Churches</title>
  <desc id="d">Comparison thumbnail for ATEM, Roland, and vMix switcher options in church production.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0E14"/>
      <stop offset="70%" stop-color="#13181F"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g stroke="#1E2733" stroke-width="1" opacity="0.55">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <rect x="0" y="0" width="1600" height="8" fill="url(#accent)"/>

  <text x="70" y="70" fill="#8B5CF6" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4">WORSHIPMETRICS</text>
  <text x="70" y="135" fill="#F5F7FB" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="50" font-weight="700">ATEM vs Roland vs vMix</text>
  <text x="70" y="176" fill="#94A3B8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22">Choosing the right switcher for church volunteers and workflows</text>

  <g transform="translate(210 280)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="330" height="380" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="165" y="58" fill="#F5F7FB" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">ATEM</text>
      <text x="165" y="90" fill="#94A3B8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="19" text-anchor="middle">Hardware-first flexibility</text>
      <rect x="50" y="130" width="230" height="90" rx="16" fill="#0F172A" stroke="#8B5CF6"/>
      <circle cx="88" cy="175" r="14" fill="#22C55E"/>
      <circle cx="130" cy="175" r="14" fill="#38BDF8"/>
      <circle cx="172" cy="175" r="14" fill="#F59E0B"/>
      <circle cx="214" cy="175" r="14" fill="#F87171"/>
      <text x="165" y="275" fill="#CBD5E1" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20" text-anchor="middle">Best when you want tactile switching</text>
      <text x="165" y="320" fill="#34D399" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Affordable multi-cam</text>
    </g>

    <g transform="translate(420 0)">
      <rect x="0" y="0" width="330" height="380" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="165" y="58" fill="#F5F7FB" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">Roland</text>
      <text x="165" y="90" fill="#94A3B8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="19" text-anchor="middle">Appliance-style simplicity</text>
      <rect x="42" y="130" width="246" height="90" rx="16" fill="#0F172A" stroke="#8B5CF6"/>
      <rect x="68" y="156" width="194" height="38" rx="10" fill="#1E293B"/>
      <rect x="84" y="166" width="34" height="18" rx="4" fill="#60A5FA"/>
      <rect x="128" y="166" width="34" height="18" rx="4" fill="#34D399"/>
      <rect x="172" y="166" width="34" height="18" rx="4" fill="#F59E0B"/>
      <rect x="216" y="166" width="34" height="18" rx="4" fill="#F87171"/>
      <text x="165" y="275" fill="#CBD5E1" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20" text-anchor="middle">Best for smaller volunteer teams</text>
      <text x="165" y="320" fill="#34D399" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Fast to train</text>
    </g>

    <g transform="translate(840 0)">
      <rect x="0" y="0" width="330" height="380" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="165" y="58" fill="#F5F7FB" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">vMix</text>
      <text x="165" y="90" fill="#94A3B8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="19" text-anchor="middle">Software switching depth</text>
      <rect x="48" y="130" width="234" height="90" rx="16" fill="#0F172A" stroke="#8B5CF6"/>
      <rect x="72" y="152" width="186" height="46" rx="10" fill="#1E293B"/>
      <rect x="84" y="164" width="48" height="22" rx="5" fill="#38BDF8"/>
      <rect x="142" y="164" width="48" height="22" rx="5" fill="#34D399"/>
      <rect x="200" y="164" width="48" height="22" rx="5" fill="#F59E0B"/>
      <text x="165" y="275" fill="#CBD5E1" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20" text-anchor="middle">Best when you need graphics and scale</text>
      <text x="165" y="320" fill="#34D399" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Most flexible</text>
    </g>
  </g>
</svg>
