<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="320" fill="url(#bgGrad)"/>
  
  <!-- Device body - transparent acrylic style -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#f0f0f0" stroke="#ccc" stroke-width="2" opacity="0.9"/>
    <rect x="0" y="0" width="200" height="120" rx="8" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
    
    <!-- Internal components -->
    <rect x="20" y="20" width="160" height="80" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <circle cx="40" cy="40" r="6" fill="#3498db"/>
    <circle cx="70" cy="40" r="6" fill="#e74c3c"/>
    <circle cx="100" cy="40" r="6" fill="#2ecc71"/>
    
    <!-- Display -->
    <rect x="40" y="55" width="120" height="35" fill="#222" stroke="#666" stroke-width="1"/>
    <text x="100" y="80" font-size="12" font-weight="bold" fill="#00aa00" text-anchor="middle">REC</text>
    
    <!-- Branding -->
    <text x="100" y="110" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">BOXCAST</text>
  </g>
  
  <!-- Label -->
  <text x="200" y="250" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">BoxCaster</text>
  <text x="200" y="280" font-size="12" fill="#666" text-anchor="middle">All-in-One Hardware Encoder</text>
  <text x="200" y="300" font-size="10" fill="#999" text-anchor="middle">1080p60 • HDMI Input • Network Optimized</text>
</svg>
