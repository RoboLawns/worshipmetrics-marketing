<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Teradek Vidiu representation -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#1a1a1a" stroke="#404040" stroke-width="2"/>
    <circle cx="30" cy="40" r="8" fill="#e74c3c"/>
    <circle cx="60" cy="40" r="6" fill="#95a5a6"/>
    <circle cx="90" cy="40" r="6" fill="#95a5a6"/>
    <text x="100" y="85" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">TERADEK</text>
    <text x="100" y="110" font-size="12" fill="#7f8c8d" text-anchor="middle">Vidiu X</text>
  </g>
  
  <!-- Digicast representation -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#0a0a0a" stroke="#404040" stroke-width="2"/>
    <!-- Fins detail -->
    <rect x="10" y="20" width="6" height="90" fill="#333"/>
    <rect x="20" y="20" width="6" height="90" fill="#333"/>
    <rect x="30" y="20" width="6" height="90" fill="#333"/>
    <rect x="40" y="20" width="6" height="90" fill="#333"/>
    <rect x="50" y="20" width="6" height="90" fill="#333"/>
    <text x="100" y="85" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">DIGICAST</text>
    <text x="100" y="110" font-size="12" fill="#7f8c8d" text-anchor="middle">DMB-8800A</text>
  </g>
  
  <!-- BoxCaster representation -->
  <g transform="translate(850, 150)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#e8e8e8" stroke="#404040" stroke-width="2"/>
    <rect x="20" y="30" width="160" height="70" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
    <circle cx="50" cy="65" r="8" fill="#3498db"/>
    <circle cx="100" cy="65" r="8" fill="#e74c3c"/>
    <circle cx="150" cy="65" r="8" fill="#2ecc71"/>
    <text x="100" y="120" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">BOXCASTER</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="350" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">Hardware Encoder Comparison</text>
  <text x="600" y="400" font-size="24" fill="#3498db" text-anchor="middle">Teradek • Vidiu • BoxCaster</text>
  <text x="600" y="450" font-size="16" fill="#bdc3c7" text-anchor="middle">Compare streaming encoder options for your ministry</text>
</svg>
