<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="320" fill="url(#bgGrad)"/>
  
  <!-- Device body -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="200" height="120" rx="12" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="2"/>
    
    <!-- Status LEDs -->
    <circle cx="30" cy="30" r="8" fill="#e74c3c"/>
    <circle cx="60" cy="30" r="6" fill="#95a5a6"/>
    <circle cx="90" cy="30" r="6" fill="#95a5a6"/>
    
    <!-- Display area -->
    <rect x="20" y="50" width="160" height="40" rx="4" fill="#111"/>
    <text x="100" y="75" font-size="14" font-weight="bold" fill="#00aa00" text-anchor="middle">LIVE</text>
    
    <!-- Branding -->
    <text x="100" y="105" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">TERADEK</text>
  </g>
  
  <!-- Label -->
  <text x="200" y="250" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">Teradek Vidiu X</text>
  <text x="200" y="280" font-size="12" fill="#666" text-anchor="middle">Portable Hardware Encoder</text>
  <text x="200" y="300" font-size="10" fill="#999" text-anchor="middle">1080p60 • USB/Ethernet • Mobile Broadcast Ready</text>
</svg>
