<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      .chart-title { font-size: 20px; font-weight: bold; fill: #333; }
      .chart-label { font-size: 12px; fill: #666; }
      .encoder-name { font-size: 14px; font-weight: bold; fill: #333; }
    </style>
  </defs>
  
  <rect width="800" height="400" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="chart-title">Hardware Encoder Comparison</text>
  
  <!-- Column headers -->
  <text x="120" y="70" text-anchor="middle" class="encoder-name">Teradek Vidiu</text>
  <text x="400" y="70" text-anchor="middle" class="encoder-name">BoxCaster</text>
  <text x="680" y="70" text-anchor="middle" class="encoder-name">Digicast DMB</text>
  
  <!-- Feature rows -->
  <g>
    <!-- Row 1: Quality -->
    <text x="20" y="120" class="chart-label">Video Quality:</text>
    <rect x="100" y="105" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="120" y="120" text-anchor="middle" class="chart-label">Good</text>
    
    <rect x="380" y="105" width="40" height="20" fill="#27ae60" rx="4"/>
    <text x="400" y="120" text-anchor="middle" class="chart-label">Excellent</text>
    
    <rect x="660" y="105" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="680" y="120" text-anchor="middle" class="chart-label">Good</text>
  </g>
  
  <!-- Row 2: Simplicity -->
  <g>
    <text x="20" y="160" class="chart-label">Ease of Setup:</text>
    <rect x="100" y="145" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="120" y="160" text-anchor="middle" class="chart-label">Moderate</text>
    
    <rect x="380" y="145" width="40" height="20" fill="#27ae60" rx="4"/>
    <text x="400" y="160" text-anchor="middle" class="chart-label">Simple</text>
    
    <rect x="660" y="145" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="680" y="160" text-anchor="middle" class="chart-label">Moderate</text>
  </g>
  
  <!-- Row 3: Reliability -->
  <g>
    <text x="20" y="200" class="chart-label">Network Resilience:</text>
    <rect x="100" y="185" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="120" y="200" text-anchor="middle" class="chart-label">Fair</text>
    
    <rect x="380" y="185" width="40" height="20" fill="#27ae60" rx="4"/>
    <text x="400" y="200" text-anchor="middle" class="chart-label">Strong</text>
    
    <rect x="660" y="185" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="680" y="200" text-anchor="middle" class="chart-label">Fair</text>
  </g>
  
  <!-- Row 4: Portability -->
  <g>
    <text x="20" y="240" class="chart-label">Portability:</text>
    <rect x="100" y="225" width="40" height="20" fill="#27ae60" rx="4"/>
    <text x="120" y="240" text-anchor="middle" class="chart-label">Excellent</text>
    
    <rect x="380" y="225" width="40" height="20" fill="#27ae60" rx="4"/>
    <text x="400" y="240" text-anchor="middle" class="chart-label">Good</text>
    
    <rect x="660" y="225" width="40" height="20" fill="#f39c12" rx="4"/>
    <text x="680" y="240" text-anchor="middle" class="chart-label">Bulky</text>
  </g>
  
  <!-- Legend -->
  <rect x="50" y="310" width="15" height="15" fill="#27ae60"/>
  <text x="75" y="322" class="chart-label">Excellent/Strong</text>
  
  <rect x="300" y="310" width="15" height="15" fill="#f39c12"/>
  <text x="325" y="322" class="chart-label">Good/Moderate</text>
  
  <rect x="550" y="310" width="15" height="15" fill="#e74c3c"/>
  <text x="575" y="322" class="chart-label">Fair/Weak</text>
</svg>
